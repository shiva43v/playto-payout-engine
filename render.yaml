services:
  # Backend Web Service
  - type: web
    name: playto-backend
    env: python
    buildCommand: python backend/build.sh.py
    startCommand: gunicorn config.wsgi:application --chdir backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: playto-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: SEED_DB
        value: true

  # Celery Worker
  - type: worker
    name: playto-worker
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: celery -A config worker -l info --chdir backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: playto-redis
          property: connectionString

  # Frontend Static Site
  - type: static_site
    name: playto-frontend
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: playto-backend
          property: url
        suffix: /api/v1

  # Redis Service
  - type: redis
    name: playto-redis
    plan: free
    ipAllowList: []

databases:
  - name: playto-db
    plan: free
